    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORJA · Experiencia profesional real para Ingeniería Informática</title>
    <meta name="description" content="FORJA conecta estudiantes de Ingeniería Informática con empresas reales mediante proyectos, niveles de experiencia y certificados verificables.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2315151a'/%3E%3Cpath d='M16 44 L32 14 L48 44 L38 44 L32 32 L26 44 Z' fill='%23A8395A'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
    /* ============================================================
       FORJA — Design tokens
       Paleta: carbón cálido / hueso / vino forjado / oro templado
       Tipografía: Instrument Serif (display, cursiva editorial) + Inter (cuerpo, estilo Apple) + JetBrains Mono (datos)
       ============================================================ */
    :root{
      --bg: #131316;
      --bg-soft: #18181c;
      --bg-elevated: #1d1d22;
      --bg-card: #202024;
      --bg-card-hover: #25252b;
      --border: #2d2d33;
      --border-soft: #25252a;
      --bone: #EDE7DA;
      --bone-dim: #B7B0A1;
      --bone-faint: #878276;
      --ink: #0e0e10;

      --forge: #E0883B;
      --forge-strong: #C76A24;
      --forge-deep: #8A3F12;
      --forge-glow: rgba(224,136,59,0.35);

      --gold: #D8B468;
      --gold-soft: #E7CE94;

      --ok: #6FAE82;
      --warn: #E0B23B;
      --bad: #D2685F;

      --radius-s: 8px;
      --radius-m: 14px;
      --radius-l: 22px;

      --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 18px 40px -22px rgba(0,0,0,0.65);
      --shadow-pop: 0 24px 60px -20px rgba(0,0,0,0.75);

      --font-display: 'Fraunces', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *,*::before,*::after{ box-sizing: border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--bone);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img{ max-width:100%; display:block; }
    a{ color:inherit; text-decoration:none; }
    button{ font-family:inherit; }
    ul{ margin:0; padding:0; list-style:none; }
    h1,h2,h3,h4{ font-family: var(--font-display); margin:0; font-weight:400; font-style:italic; letter-spacing:-0.01em; }
    strong, b{ font-family: var(--font-body); font-weight:700; font-style:normal; }
    p{ margin:0; }
    ::selection{ background: var(--forge); color: var(--ink); }

    :focus-visible{ outline: 2px solid var(--forge); outline-offset: 2px; border-radius: 4px; }

    /* subtle grain / vignette backdrop, signature texture */
    .app-bg-texture{
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(900px 500px at 12% -10%, rgba(168,57,90,0.14), transparent 60%),
        radial-gradient(700px 500px at 110% 10%, rgba(216,180,104,0.09), transparent 55%),
        radial-gradient(1000px 700px at 50% 120%, rgba(126,38,67,0.10), transparent 60%);
    }

    .mono{ font-family: var(--font-mono); letter-spacing: 0.02em; }
    .eyebrow{
      font-family: var(--font-mono);
      font-size: 15.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--forge);
      display:flex; align-items:center; gap:8px;
    }
    .eyebrow::before{ content:''; width:16px; height:1px; background: var(--forge); display:inline-block; }

    /* ---------- Buttons ---------- */
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 18px; font-weight:600;
      border: 1px solid transparent;
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
      white-space: nowrap;
    }
    .btn:active{ transform: translateY(1px); }
    .btn-primary{
      background: linear-gradient(180deg, var(--forge), var(--forge-strong));
      color: #F8EEE4;
      box-shadow: 0 10px 24px -10px var(--forge-glow);
    }
    .btn-primary:hover{ box-shadow: 0 14px 30px -10px var(--forge-glow); filter: brightness(1.05); }
    .btn-ghost{
      background: transparent; color: var(--bone); border-color: var(--border);
    }
    .btn-ghost:hover{ background: var(--bg-card); border-color: #3a3a42; }
    .btn-dark{
      background: var(--ink); color: var(--bone); border-color:#000;
    }
    .btn-sm{ padding: 8px 14px; font-size:16px; }
    .btn-block{ width:100%; }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; }
    .btn-danger-ghost{ background:transparent; border-color: rgba(210,104,95,.4); color: var(--bad); }
    .btn-danger-ghost:hover{ background: rgba(210,104,95,.1); }

    /* ---------- Cards & chips ---------- */
    .card{
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-m);
      box-shadow: var(--shadow-card);
    }
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      padding: 5px 11px; border-radius:999px;
      font-size: 16px; font-weight:600;
      background: var(--bg-elevated); border:1px solid var(--border);
      color: var(--bone-dim);
    }
    .chip-dot{ width:6px; height:6px; border-radius:50%; }

    .tag-level{
      display:inline-flex; align-items:center; gap:6px;
      font-family: var(--font-mono); font-size:15px; letter-spacing:.05em;
      padding: 4px 10px; border-radius: 999px; font-weight:600;
      border:1px solid transparent;
    }

    /* ---------- Layout shells ---------- */
    .shell{ position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }
    .container{ width:100%; max-width:1180px; margin:0 auto; padding: 0 28px; }

    /* Top bar (public) */
    .pub-nav{
      position:sticky; top:0; z-index:50;
      background: rgba(27,20,23,0.8); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-soft);
    }
    .pub-nav-inner{ display:flex; align-items:center; justify-content:space-between; padding: 16px 28px; max-width:1180px; margin:0 auto; }
    .brand{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:23px; font-weight:700; letter-spacing:0.01em; }
    .brand-mark{
      width:34px; height:34px; border-radius:9px;
      background: linear-gradient(155deg, var(--forge), var(--forge-deep));
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 8px 18px -8px var(--forge-glow);
      position:relative; overflow:hidden;
    }
    .brand-mark svg{ width:20px; height:20px; }
    .brand small{ display:block; font-family: var(--font-mono); font-size:14.5px; color: var(--bone-faint); font-weight:500; letter-spacing:.1em; text-transform:uppercase; margin-top:1px;}
    .pub-links{ display:flex; align-items:center; gap:28px; font-size:17.5px; font-weight:500; color: var(--bone-dim); }
    .pub-links a:hover{ color: var(--bone); }
    .pub-actions{ display:flex; gap:10px; align-items:center; }

    /* App shell (logged-in) */
    .app-shell{ display:flex; min-height:100vh; }
    .sidebar{
      width: 264px; flex-shrink:0;
      background:
        linear-gradient(180deg, rgba(168,57,90,0.09), transparent 30%),
        linear-gradient(200deg, rgba(216,180,104,0.05), transparent 45%),
        var(--bg-soft);
      border-right:1px solid var(--border-soft);
      display:flex; flex-direction:column;
      position:sticky; top:0; height:100vh;
    }
    .sidebar-top{ padding: 22px 20px 14px; }
    .sidebar-nav{ flex:1; padding: 6px 14px; overflow-y:auto; }
    .side-link{
      display:flex; align-items:center; gap:12px;
      padding: 10px 12px; border-radius: 10px;
      font-size: 17.5px; font-weight:500; color: var(--bone-dim);
      margin-bottom: 2px; cursor:pointer;
      transition: background .15s ease, color .15s ease;
    }
    .side-link svg{ width:18px; height:18px; flex-shrink:0; opacity:.85; }
    .side-link:hover{ background: var(--bg-elevated); color: var(--bone); }
    .side-link.active{ background: linear-gradient(90deg, rgba(168,57,90,0.22), rgba(168,57,90,0.03)); color: var(--bone); box-shadow: inset 2px 0 0 var(--forge); }
    .side-section-label{ font-family: var(--font-mono); font-size:15px; letter-spacing:.12em; text-transform:uppercase; color: var(--bone-faint); padding: 16px 12px 6px; }
    .sidebar-bottom{ padding: 14px; border-top:1px solid var(--border-soft); }

    .identity-card{
      display:flex; align-items:center; gap:10px;
      padding:10px; border-radius:12px; background: var(--bg-elevated); border:1px solid var(--border-soft);
      cursor:pointer;
    }
    .avatar{
      width:38px; height:38px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-family: var(--font-display); font-weight:700; font-size:17.5px;
      color: var(--ink); background: linear-gradient(160deg, var(--gold-soft), var(--forge));
      overflow:hidden;
    }
    .identity-meta{ min-width:0; }
    .identity-meta strong{ display:block; font-size:16px; color: var(--bone); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .identity-meta span{ display:block; font-size:15.5px; color: var(--bone-faint); }

    .main-area{ flex:1; min-width:0; }
    .topbar{
      position:sticky; top:0; z-index:30;
      display:flex; align-items:center; justify-content:space-between;
      padding: 16px 32px;
      background:
        linear-gradient(90deg, rgba(168,57,90,0.07), transparent 60%),
        rgba(27,20,23,0.72);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border-soft);
    }
    .topbar h1{ font-size: 22px; }
    .topbar-sub{ font-size:17px; color: var(--bone-faint); margin-top:2px; }
    .page{ padding: 30px 32px 70px; max-width: 1180px; }

    /* ---------- Forms ---------- */
    .field{ margin-bottom:16px; }
    .field label{ display:block; font-size:17px; font-weight:600; color: var(--bone-dim); margin-bottom:7px; }
    .field input, .field select, .field textarea{
      width:100%; padding: 11px 13px; border-radius: 10px;
      background: var(--bg-elevated); border:1px solid var(--border);
      color: var(--bone); font-size:17.5px; font-family: inherit;
      transition: border-color .15s ease;
    }
    .field input:focus, .field select:focus, .field textarea:focus{ border-color: var(--forge); outline:none; }
    .field textarea{ resize:vertical; min-height:90px; }
    .field-hint{ font-size:15.5px; color: var(--bone-faint); margin-top:5px; }
    .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

    /* ---------- Misc ---------- */
    .hr{ height:1px; background: var(--border-soft); border:none; margin: 24px 0; }
    .scrim{
      position:fixed; inset:0; background: rgba(8,8,9,0.72); backdrop-filter: blur(3px);
      z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .modal{
      background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius-l);
      width: 100%; max-width: 520px; padding: 26px; box-shadow: var(--shadow-pop);
      max-height: 88vh; overflow-y:auto;
    }
    .toast-wrap{ position:fixed; bottom:24px; right:24px; z-index:300; display:flex; flex-direction:column; gap:10px; }
    .toast{
      background: var(--bg-elevated); border:1px solid var(--border); border-left:3px solid var(--forge);
      color:var(--bone); padding:13px 16px; border-radius:10px; font-size:17px; box-shadow: var(--shadow-pop);
      min-width:240px; animation: toastIn .25s ease;
    }
    @keyframes toastIn{ from{ opacity:0; transform: translateY(8px);} to{opacity:1; transform:none;} }

    .skeleton-empty{
      border: 1px dashed var(--border); border-radius: var(--radius-m);
      padding: 50px 26px; text-align:center; color: var(--bone-faint);
    }

    /* progress / heat-gauge XP bar (signature element) */
    .heatbar{ height:10px; border-radius:999px; background: var(--bg-elevated); overflow:hidden; position:relative; border:1px solid var(--border); }
    .heatbar-fill{
      height:100%; border-radius:999px;
      background: linear-gradient(90deg, var(--forge-deep), var(--forge), var(--gold-soft));
      position:relative;
      box-shadow: 0 0 14px var(--forge-glow);
      transition: width .6s cubic-bezier(.2,.8,.2,1);
    }
    .heatbar-fill::after{
      content:''; position:absolute; inset:0;
      background: repeating-linear-gradient(115deg, rgba(255,255,255,0.18) 0 2px, transparent 2px 9px);
      opacity:.5;
    }

    table{ width:100%; border-collapse:collapse; }
    th{ text-align:left; font-family: var(--font-mono); font-size:15px; letter-spacing:.08em; text-transform:uppercase; color: var(--bone-faint); font-weight:600; padding: 0 14px 10px; }
    td{ padding: 14px; border-top:1px solid var(--border-soft); font-size:17px; }

    @media (max-width: 920px){
      .sidebar{ display:none; }
      .page{ padding: 22px 16px 70px; }
      .topbar{ padding: 14px 16px; }
      .field-row{ grid-template-columns:1fr; }
      .pub-links{ display:none; }
    }
    </style>
    </head>

    const DB_KEY = 'forja_db_v2';

    function freshState(){
      return {
        session: null,

    function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

    let STATE = loadState();
    function loadState(){
      try{
        const raw = localStorage.getItem(DB_KEY);
        if(!raw) return freshState();
        const parsed = JSON.parse(raw);
        const fresh = freshState();
        return {
          ...fresh,
          ...parsed,
          student: Object.assign({}, fresh.student, parsed.student, {
            links: Object.assign({}, fresh.student.links, parsed.student && parsed.student.links),
            languages: (parsed.student && parsed.student.languages) || fresh.student.languages,
          }),
          company: Object.assign({}, fresh.company, parsed.company, {
            links: Object.assign({}, fresh.company.links, parsed.company && parsed.company.links),
          }),
          projects: (parsed.projects && parsed.projects.length) ? parsed.projects : fresh.projects,
        };
      }catch(e){ return freshState(); }
    }
    function saveState(){ localStorage.setItem(DB_KEY, JSON.stringify(STATE)); }

    const APP_STATUS = {
      POSTULADO:'postulado', EN_PROGRESO:'en_progreso', EN_REVISION:'en_revision', COMPLETADO:'completado', RECHAZADO:'rechazado',
    };
    const STATUS_META = {
      postulado:   { label:'Postulado',     color:'#D8B468' },
      en_progreso: { label:'En progreso',   color:'#A8395A' },
      en_revision: { label:'En revisión',   color:'#7FB7D1' },

    };

    function getLevel(xp){ return LEVELS.find(l=> xp>=l.minXp && xp<=l.maxXp) || LEVELS[0]; }
    function getNextLevel(xp){
      const i = LEVELS.findIndex(l=> xp>=l.minXp && xp<=l.maxXp);
      return LEVELS[i+1] || null;
    }
    function levelProgress(xp){
      const lvl = getLevel(xp); const next = getNextLevel(xp);
      if(!next) return 100;
      const span = next.minXp - lvl.minXp;
      return Math.min(100, Math.round(((xp - lvl.minXp) / span) * 100));
    }
    function findProject(id){ return STATE.projects.find(p=>p.id===id); }
    function findApplication(id){ return STATE.applications.find(a=>a.id===id); }
    function studentApplicationFor(projectId){ return STATE.applications.find(a=>a.projectId===projectId && a.studentId===STATE.student.id); }

    function addNotification(forRole, message, link){
      STATE.notifications.unshift({
        id:'ntf-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),
        forRole, message, link: link||null,
        createdAt: new Date().toISOString(), read:false,
      });
      saveState();
    }
    function notificationsFor(role){ return STATE.notifications.filter(n=>n.forRole===role); }
    function unreadCountFor(role){ return STATE.notifications.filter(n=>n.forRole===role && !n.read).length; }
    function markAllNotificationsRead(role){
      STATE.notifications.forEach(n=>{ if(n.forRole===role) n.read = true; });
      saveState();
    }

    function applyToProject(projectId){
      if(studentApplicationFor(projectId)) return;
      const project = findProject(projectId); if(!project) return;
      STATE.applications.push({
        id:'app-'+Date.now(), projectId, studentId: STATE.student.id,
        status: APP_STATUS.POSTULADO, appliedAt: new Date().toISOString(), completedMilestones: [],
      });
      addNotification('company', `${STATE.student.name} se postuló a "${project.title}".`, `#/company/applicants?id=${project.id}`);
      saveState();
      toast(`Postulación enviada a "${project.title}"`);
    }

    function companyAcceptApplication(appId){
      const app = findApplication(appId); if(!app) return;
      const project = findProject(app.projectId);
      app.status = APP_STATUS.EN_PROGRESO;
      addNotification('student', `¡Fuiste aceptado en "${project.title}"! Ya puedes ver el progreso del proyecto.`, `#/student/project?id=${project.id}`);
      saveState();
      toast('Postulante aceptado. El proyecto pasó a "En progreso".');
    }
    function companyRejectApplication(appId){
      const app = findApplication(appId); if(!app) return;
      const project = findProject(app.projectId);
      app.status = APP_STATUS.RECHAZADO;
      addNotification('student', `No fuiste seleccionado para "${project.title}" esta vez.`, `#/student/applications`);
      saveState();
      toast('Postulación marcada como no seleccionada.');
    }
    function toggleMilestone(appId, milestoneId){
      const app = findApplication(appId); if(!app) return;
      const project = findProject(app.projectId);
      const has = app.completedMilestones.includes(milestoneId);
      app.completedMilestones = has
        ? app.completedMilestones.filter(m=>m!==milestoneId)
        : [...app.completedMilestones, milestoneId];
      if(app.completedMilestones.length === project.milestones.length){
        app.status = APP_STATUS.EN_REVISION;
      } else if(app.status === APP_STATUS.EN_REVISION){
        app.status = APP_STATUS.EN_PROGRESO;
      }
      saveState();
    }
    function companyApproveCompletion(appId){
      const app = findApplication(appId); if(!app) return;
      const project = findProject(app.projectId);
      app.status = APP_STATUS.COMPLETADO;
      STATE.student.xp += project.xpReward;
      STATE.student.hoursCompleted += project.hours;
      STATE.student.projectsCompleted += 1;
      const cert = {
        id:'cert-'+Date.now(),
        code: 'FRJ-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+new Date().getFullYear(),
        projectId: project.id, projectTitle: project.title, company: project.company,
        hours: project.hours, xp: project.xpReward, issuedAt: new Date().toISOString(),
        applicationId: app.id,
      };
      STATE.certificates.push(cert);
      addNotification('student', `Certificado emitido para "${project.title}". ¡Felicidades, ${firstTwoNames(STATE.student.name).split(' ')[0]}!`, `#/student/certificates`);
      saveState();
      toast(`¡Proyecto aprobado! Certificado emitido (+${project.xpReward} XP).`);
    }

    function publishProject(payload){
      const id = 'p-'+Date.now();
      const milestones = payload.milestones.map((m,i)=>({ id:'m'+(i+1), label:m.label, hours: Number(m.hours)||0 }));
      STATE.projects.unshift({
        id, title: payload.title, company: STATE.company.name, companyLogo: STATE.company.avatarInitials,
        category: payload.category, level: payload.level, techStack: payload.tech,
        duration: payload.duration, hours: Number(payload.hours)||0, xpReward: Number(payload.xp)||0,
        spots: Number(payload.spots)||1, description: payload.description,
        requirements: payload.requirements, milestones,
      });
      saveState();
      toast('Proyecto publicado correctamente.');
      return id;
    }

    function toast(msg){
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(()=>{ el.style.transition='opacity .4s ease, transform .4s ease'; el.style.opacity='0'; el.style.transform='translateY(6px)'; setTimeout(()=>el.remove(), 400); }, 3200);
    }

      return new Date(iso).toLocaleDateString('es-PE', { day:'2-digit', month:'long', year:'numeric' });

    function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function statusChip(status){

    function route(){
      const rawHash = location.hash.slice(1);
      const sectionAnchors = ['como-funciona','proyectos','niveles','empresas'];
      if(sectionAnchors.includes(rawHash)){
        const root = document.getElementById('root');
        if(!document.getElementById(rawHash)){
          renderPublicShell(root, viewLanding());
        }
        setTimeout(()=>{ const el=document.getElementById(rawHash); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }, 30);
        return;
      }
      const hash = location.hash.replace(/^#\/?/, '') || 'home';
      const [pathPart, queryPart] = hash.split('?');
      const path = pathPart.replace(/\/$/, '') || 'home';
      const params = new URLSearchParams(queryPart || '');

      const root = document.getElementById('root');
      window.scrollTo(0,0);

      // public pages
      if(path === 'home') return renderPublicShell(root, viewLanding());
      if(path === 'login') return renderPublicShell(root, viewLogin());

      // gated pages
      if(!STATE.session){ location.hash = '#/login'; return; }

      if(STATE.session.role === 'student'){
        if(path === 'student') return renderAppShell(root, 'student', 'dashboard', viewStudentDashboard());
        if(path === 'student/projects') return renderAppShell(root, 'student', 'projects', viewProjectsExplorer(params));
        if(path === 'student/project') return renderAppShell(root, 'student', 'projects', viewProjectDetail(params.get('id')));
        if(path === 'student/applications') return renderAppShell(root, 'student', 'applications', viewMyApplications());
        if(path === 'student/certificates') return renderAppShell(root, 'student', 'certificates', viewMyCertificates());
        if(path === 'student/profile') return renderAppShell(root, 'student', 'profile', viewStudentProfile());
      } else {
        if(path === 'company') return renderAppShell(root, 'company', 'dashboard', viewCompanyDashboard());
        if(path === 'company/projects') return renderAppShell(root, 'company', 'projects', viewCompanyProjects());
        if(path === 'company/publish') return renderAppShell(root, 'company', 'publish', viewPublishProject());
        if(path === 'company/applicants') return renderAppShell(root, 'company', 'projects', viewApplicants(params.get('id')));
        if(path === 'company/progress') return renderAppShell(root, 'company', 'projects', viewCompanyProgress(params.get('appId')));
        if(path === 'company/profile') return renderAppShell(root, 'company', 'profile', viewCompanyProfile());
      }
      location.hash = STATE.session.role === 'student' ? '#/student' : '#/company';
    }
    window.addEventListener('hashchange', route);

    // Sincronización entre pestañas: cuando otra pestaña (ej. la de la empresa)
    // guarda cambios (postulaciones, notificaciones, proyectos), esta pestaña
    // los recibe en vivo sin perder su propia sesión (estudiante o empresa).
    window.addEventListener('storage', (e)=>{
      if(e.key !== DB_KEY || !e.newValue) return;
      const mySession = STATE.session;
      STATE = loadState();
      STATE.session = mySession;
      route();
    });

    function progressTimeline(app, p){
      const stages = [
        { key:'postulado', label:'Postulado', done:true },
        { key:'aceptado', label:'Aceptado', done: app.status !== APP_STATUS.POSTULADO && app.status !== APP_STATUS.RECHAZADO },
        { key:'hitos', label:'Hitos en progreso', done: app.completedMilestones.length > 0 || app.status===APP_STATUS.EN_REVISION || app.status===APP_STATUS.COMPLETADO },
        { key:'revision', label:'En revisión', done: app.status===APP_STATUS.EN_REVISION || app.status===APP_STATUS.COMPLETADO },
        { key:'completado', label:'Certificado emitido', done: app.status===APP_STATUS.COMPLETADO },
      ];
      const activeIdx = stages.reduce((acc,s,i)=> s.done ? i : acc, 0);
      const stageRow = stages.map((s,i)=>{
        const state = i < activeIdx ? 'done' : (i === activeIdx ? 'current' : 'pending');
        const color = state==='pending' ? 'var(--bone-faint)' : (state==='current' ? 'var(--forge)' : 'var(--ok)');
        return `
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; position:relative; min-width:64px;">
          ${i>0 ? `<div style="position:absolute; right:50%; top:9px; width:100%; height:2px; background:${i<=activeIdx?'var(--forge)':'var(--border)'};"></div>` : ''}
          <div style="width:19px; height:19px; border-radius:50%; background:${state==='pending'?'var(--bg-elevated)':color}; border:2px solid ${color}; z-index:1; display:flex; align-items:center; justify-content:center;">
            ${state==='done' ? `<span style="color:var(--ink); display:flex; width:11px; height:11px;">${ICONS.check}</span>` : ''}
          </div>
          <span class="mono" style="font-size:14.5px; margin-top:8px; text-align:center; color:${state==='pending'?'var(--bone-faint)':'var(--bone)'};">${s.label}</span>
        </div>`;
      }).join('');

      const milestonesTimeline = p.milestones.map((m,i)=>{
        const done = app.completedMilestones.includes(m.id);
        return `<div style="display:flex; gap:12px; align-items:flex-start; padding:9px 0;">
          <div style="width:20px; height:20px; border-radius:50%; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; background:${done?'var(--ok)':'var(--bg-elevated)'}; border:2px solid ${done?'var(--ok)':'var(--border)'};">
            ${done?`<span style="color:var(--ink); display:flex; width:11px; height:11px;">${ICONS.check}</span>`:`<span class="mono" style="font-size:13px; color:var(--bone-faint);">${i+1}</span>`}
          </div>
          <div>
            <span style="font-size:16px; color:${done?'var(--bone)':'var(--bone-dim)'};">${esc(m.label)}</span>
            <span class="mono" style="font-size:15px; color:var(--bone-faint); margin-left:6px;">· ${m.hours}h</span>
          </div>
        </div>`;
      }).join('');

      return `<div class="card" style="padding:20px 18px;">
        <strong style="font-size:16px; display:block; margin-bottom:18px;">Línea de tiempo del proyecto</strong>
        <div style="display:flex; padding:0 4px;">${stageRow}</div>
        <div class="hr"></div>
        <strong style="font-size:17px; color:var(--bone-dim); display:block; margin-bottom:4px;">Hitos</strong>
        ${milestonesTimeline}
      </div>`;
    }

    function topbar(title, sub, actionsHtml){
      const role = STATE.session ? STATE.session.role : null;

      return `<div class="topbar"><div><h1>${title}</h1>${sub?`<div class="topbar-sub">${sub}</div>`:''}</div><div style="display:flex; gap:10px; align-items:center; position:relative;">${bellHtml}${actionsHtml||''}</div></div>`;

      return `

        <button class="btn btn-ghost btn-sm" id="notif-bell-btn" style="padding:9px 11px; position:relative;">
          ${icon('bell')}
          ${unread ? `<span style="position:absolute; top:4px; right:4px; width:8px; height:8px; border-radius:50%; background:var(--forge); box-shadow:0 0 0 2px var(--bg-card);"></span>` : ''}

        <div class="card" style="margin-top:20px; padding:22px;">

    function statCard(label, value, color, iconName){
      return `<div class="card" style="padding:18px;">
        <div style="display:flex; align-items:center; gap:10px; color:${color};">${icon(iconName)}<span class="mono" style="font-size:15px; letter-spacing:.06em; color:var(--bone-faint); text-transform:uppercase;">${label}</span></div>
        <strong style="display:block; font-size:28px; margin-top:12px; font-family:var(--font-display);">${value}</strong>
      </div>`;
    }
    function applicationRow(a){
      const p = findProject(a.projectId);
      const pct = Math.round((a.completedMilestones.length / p.milestones.length) * 100);
      return `<a href="#/student/project?id=${p.id}" class="card" style="display:block; padding:16px 18px; margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
          <div>
            <strong style="font-size:18px;">${esc(p.title)}</strong>
            <div style="font-size:16px; color:var(--bone-faint); margin-top:4px;">${esc(p.company)} · ${p.hours}h · +${p.xpReward} XP</div>
          </div>
          ${statusChip(a.status)}
        </div>
        <div class="heatbar" style="margin-top:12px;"><div class="heatbar-fill" style="width:${pct}%"></div></div>
        <div class="mono" style="font-size:15px; color:var(--bone-faint); margin-top:6px;">${a.completedMilestones.length}/${p.milestones.length} hitos completados</div>
      </a>`;
    }
    function recommendedRow(p){
      const img = CATEGORY_IMG[p.category] || IMG.hero;
      return `<a href="#/student/project?id=${p.id}" class="card" style="display:flex; gap:12px; padding:12px; align-items:center;">
        <img src="${img}" alt="" style="width:54px;height:54px;border-radius:10px;object-fit:cover; flex-shrink:0;" onerror="this.remove()">

          <strong style="font-size:16px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(p.title)}</strong>

        </div>
      </a>`;

    function certMiniCard(c){
      return `<div class="card" style="padding:16px; display:flex; gap:12px; align-items:center;">
        <div style="width:40px;height:40px;border-radius:10px; background:var(--gold)1f; display:flex; align-items:center; justify-content:center; color:var(--gold); flex-shrink:0;">${icon('award')}</div>
        <div style="min-width:0;">
          <strong style="font-size:16px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(c.projectTitle)}</strong>
          <span class="mono" style="font-size:15px; color:var(--bone-faint);">${c.code}</span>
        </div>
      </div>`;
    }

    /* ---------------------------------------------------------------------------
       VISTA: PROJECTS EXPLORER
    --------------------------------------------------------------------------- */
    function viewProjectsExplorer(params){
      const cat = params.get('cat') || '';
      const lvl = params.get('lvl') || '';
      const q = (params.get('q') || '').toLowerCase();
      const cats = [...new Set(STATE.projects.map(p=>p.category))];

      let list = STATE.projects.filter(p=>{
        if(cat && p.category !== cat) return false;
        if(lvl && p.level !== lvl) return false;
        if(q && !(p.title.toLowerCase().includes(q) || p.company.toLowerCase().includes(q))) return false;
        return true;
      });

      return `
      ${topbar('Explorar proyectos', `${list.length} proyectos disponibles para Ingeniería Informática`)}
      <div class="page">
        <div class="card" style="padding:16px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
          <input id="search-input" type="text" placeholder="Buscar por título o empresa…" value="${esc(q)}" style="flex:1; min-width:220px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; padding:10px 13px; color:var(--bone); font-size:17px;">
          <select id="filter-cat" style="background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; padding:10px 13px; color:var(--bone); font-size:17px;">
            <option value="">Todas las categorías</option>
            ${cats.map(c=>`<option value="${esc(c)}" ${c===cat?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
          <select id="filter-lvl" style="background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; padding:10px 13px; color:var(--bone); font-size:17px;">
            <option value="">Todos los niveles</option>
            ${LEVELS.map(l=>`<option value="${l.id}" ${l.id===lvl?'selected':''}>${l.label}</option>`).join('')}
          </select>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:22px;">
          ${list.length ? list.map(p=>explorerCard(p)).join('') : `<div class="skeleton-empty" style="grid-column:1/-1;">No se encontraron proyectos con esos filtros.</div>`}
        </div>
      </div>`;
    }
    function explorerCard(p){
      const img = CATEGORY_IMG[p.category] || IMG.hero;
      const applied = !!studentApplicationFor(p.id);
      return `<a href="#/student/project?id=${p.id}" class="card" style="overflow:hidden; display:block;">
        <div style="height:140px; overflow:hidden; position:relative;">
          <img src="${img}" alt="${esc(p.category)}" style="width:100%;height:100%;object-fit:cover" onerror="this.remove()">
          ${applied ? `<span class="chip" style="position:absolute; top:10px; right:10px; background:rgba(27,20,23,0.88);">Ya postulaste</span>` : ''}
        </div>
        <div style="padding:18px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span class="chip">${esc(p.category)}</span>
            ${levelTag(p.level)}
          </div>
          <h3 style="font-size:19px; line-height:1.3; min-height:42px;">${esc(p.title)}</h3>
          <p style="font-size:17px; color:var(--bone-faint); margin-top:8px;">${esc(p.company)}</p>
          <div class="hr" style="margin:14px 0;"></div>
          <div style="display:flex; justify-content:space-between; font-size:16px;" class="mono">
            <span style="color:var(--bone-dim);">${p.duration} · ${p.hours}h</span>
            <span style="color:var(--forge);">+${p.xpReward} XP</span>
          </div>
        </div>
      </a>`;
    }

    /* ---------------------------------------------------------------------------
       VISTA: PROJECT DETAIL
    --------------------------------------------------------------------------- */
    function viewProjectDetail(id){
      const p = findProject(id);
      if(!p) return `${topbar('Proyecto no encontrado','')}<div class="page"><div class="skeleton-empty">Este proyecto ya no está disponible. <a href="#/student/projects" style="color:var(--forge)">Volver al catálogo</a></div></div>`;
      const app = studentApplicationFor(p.id);
      const img = CATEGORY_IMG[p.category] || IMG.hero;

      let actionBlock = '';
      if(!app){
        actionBlock = `<button class="btn btn-primary btn-block" id="apply-btn">${icon('bolt')} Postular a este proyecto</button>`;
      } else if(app.status === APP_STATUS.POSTULADO){
        actionBlock = `<div class="card" style="padding:16px; text-align:center;">${statusChip(app.status)}<p style="font-size:17px; color:var(--bone-faint); margin-top:10px;">La empresa está revisando tu postulación.</p></div>`;
      } else if(app.status === APP_STATUS.RECHAZADO){
        actionBlock = `<div class="card" style="padding:16px; text-align:center;">${statusChip(app.status)}<p style="font-size:17px; color:var(--bone-faint); margin-top:10px;">No fuiste seleccionado esta vez. Sigue explorando.</p></div>`;
      } else {
        actionBlock = `
        ${progressTimeline(app, p)}
        <div class="card" style="padding:18px; margin-top:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <strong style="font-size:17px;">Marcar hitos completados</strong>
            ${statusChip(app.status)}
          </div>
          ${p.milestones.map(m=>{
            const done = app.completedMilestones.includes(m.id);
            const locked = app.status === APP_STATUS.COMPLETADO;
            return `<label style="display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-top:1px solid var(--border-soft); cursor:${locked?'default':'pointer'};">
              <input type="checkbox" data-milestone="${m.id}" data-app="${app.id}" ${done?'checked':''} ${locked?'disabled':''} style="margin-top:3px; accent-color:var(--forge); width:16px; height:16px;">
              <span style="font-size:16px; flex:1;">${esc(m.label)} <span class="mono" style="color:var(--bone-faint); font-size:15px;">· ${m.hours}h</span></span>
            </label>`;
          }).join('')}
          ${app.status === APP_STATUS.COMPLETADO ? `<div class="hr"></div><a href="#/student/certificates" class="btn btn-dark btn-block btn-sm">${icon('award')} Ver certificado</a>` : ''}
        </div>`;
      }

      return `
      ${topbar(p.title, p.company)}
      <div class="page">
        <a href="#/student/projects" style="font-size:17px; color:var(--bone-dim); display:inline-block; margin-bottom:18px;">← Volver al catálogo</a>
        <div style="display:grid; grid-template-columns:1.6fr 1fr; gap:26px;">
          <div>
            <div style="border-radius:18px; overflow:hidden; border:1px solid var(--border); aspect-ratio:16/7;">
              <img src="${img}" alt="${esc(p.category)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.remove()">
            </div>
            <div style="display:flex; gap:10px; margin:18px 0; flex-wrap:wrap;">
              <span class="chip">${esc(p.category)}</span>
              ${levelTag(p.level)}
              ${p.techStack.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}
            </div>
            <h3 style="font-size:19px; margin-top:24px;">Descripción</h3>
            <p style="color:var(--bone-dim); margin-top:10px; line-height:1.7; font-size:18px;">${esc(p.description)}</p>

            <h3 style="font-size:19px; margin-top:26px;">Requisitos</h3>
            <ul style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
              ${p.requirements.map(r=>`<li style="display:flex; gap:10px; font-size:17px; color:var(--bone-dim);">${icon('check')}${esc(r)}</li>`).join('')}
            </ul>

            <h3 style="font-size:19px; margin-top:26px;">Hitos planificados</h3>
            <table style="margin-top:10px;">
              <thead><tr><th>Hito</th><th>Horas</th></tr></thead>
              <tbody>${p.milestones.map(m=>`<tr><td>${esc(m.label)}</td><td class="mono">${m.hours}h</td></tr>`).join('')}</tbody>
            </table>
          </div>
          <div>
            <div class="card" style="padding:20px; margin-bottom:16px;">
              <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:16px;"><span style="color:var(--bone-faint)">Duración</span><strong>${p.duration}</strong></div>
              <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:16px;"><span style="color:var(--bone-faint)">Horas totales</span><strong>${p.hours}h</strong></div>
              <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:16px;"><span style="color:var(--bone-faint)">Experiencia</span><strong style="color:var(--forge)">+${p.xpReward} XP</strong></div>
              <div style="display:flex; justify-content:space-between; padding:8px 0; font-size:16px;"><span style="color:var(--bone-faint)">Cupos</span><strong>${p.spots}</strong></div>
            </div>
            ${actionBlock}
          </div>
        </div>
      </div>`;
    }

    /* ---------------------------------------------------------------------------
       VISTA: MY APPLICATIONS
    --------------------------------------------------------------------------- */

    /* ---------------------------------------------------------------------------
       CERTIFICADO PDF — generado 100% en cliente con jsPDF (vectorial)
    --------------------------------------------------------------------------- */
    function downloadCertificatePDF(certId){
      const c = STATE.certificates.find(x=>x.id===certId);
      if(!c){ toast('No se encontró el certificado.'); return; }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'a4' });
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();

      const ink = [20,13,15];
      const bone = [243,236,226];
      const boneDim = [190,178,166];
      const forge = [184,80,110];
      const forgeDeep = [74,22,38];
      const gold = [216,180,104];

      // background
      doc.setFillColor(...ink);
      doc.rect(0,0,W,H,'F');

      // subtle radial-ish corner glow simulated with translucent circles
      doc.setFillColor(168,57,90);
      doc.setGState(new doc.GState({opacity:0.06}));
      doc.circle(70, 60, 220, 'F');
      doc.setGState(new doc.GState({opacity:0.04}));
      doc.circle(W-60, H-50, 260, 'F');
      doc.setGState(new doc.GState({opacity:1}));

      // watermark
      doc.setFont('times','bolditalic');
      doc.setFontSize(150);
      doc.setTextColor(255,255,255);
      doc.setGState(new doc.GState({opacity:0.025}));
      doc.text('FORJA', W/2, H/2+50, { align:'center', angle:0 });
      doc.setGState(new doc.GState({opacity:1}));

      // outer border
      doc.setDrawColor(...forge);
      doc.setLineWidth(1.4);
      doc.rect(28,28,W-56,H-56);
      doc.setDrawColor(...gold);
      doc.setLineWidth(0.6);
      doc.rect(34,34,W-68,H-68);

      // corner flourishes
      [[40,40,1,1],[W-40,40,-1,1],[40,H-40,1,-1],[W-40,H-40,-1,-1]].forEach(([x,y,sx,sy])=>{
        doc.setDrawColor(...gold);
        doc.setLineWidth(1);
        doc.line(x, y, x+24*sx, y);
        doc.line(x, y, x, y+24*sy);
      });

      // header: mark + brand
      const markX = W/2 - 150, markY = 64;
      doc.setFillColor(...forge);
      doc.triangle(markX, markY+16, markX+9, markY-2, markX+18, markY+16, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(15);
      doc.setTextColor(...bone);
      doc.text('FORJA', markX+28, markY+8);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8.5);
      doc.setTextColor(...boneDim);
      doc.text('PLATAFORMA DE EXPERIENCIA PROFESIONAL · INGENIERÍA INFORMÁTICA', markX+28, markY+19);

      // eyebrow
      doc.setFont('helvetica','normal');
      doc.setFontSize(11);
      doc.setTextColor(...forge);
      doc.text('C E R T I F I C A D O   D E   E X P E R I E N C I A   P R O F E S I O N A L', W/2, 118, { align:'center' });

      // recipient name
      doc.setFont('times','bolditalic');
      doc.setFontSize(38);
      doc.setTextColor(...bone);
      doc.text(STATE.student.name, W/2, 165, { align:'center' });

      // underline flourish
      doc.setDrawColor(...gold);
      doc.setLineWidth(0.8);
      doc.line(W/2-130, 178, W/2+130, 178);

      // statement
      doc.setFont('helvetica','normal');
      doc.setFontSize(11.5);
      doc.setTextColor(...boneDim);
      doc.text(`${STATE.student.career}, ha completado satisfactoriamente el proyecto`, W/2, 202, { align:'center' });

      doc.setFont('times','bold');
      doc.setFontSize(19);
      doc.setTextColor(...bone);
      const titleLines = doc.splitTextToSize(`"${c.projectTitle}"`, W-220);
      doc.text(titleLines, W/2, 228, { align:'center' });

      const afterTitleY = 228 + (titleLines.length-1)*22 + 26;
      doc.setFont('helvetica','normal');
      doc.setFontSize(11.5);
      doc.setTextColor(...boneDim);
      doc.text(`en colaboración con `, W/2-60, afterTitleY, {align:'right'});
      doc.setFont('helvetica','bold');
      doc.setTextColor(...bone);
      doc.text(c.company, W/2-58, afterTitleY, {align:'left'});

      // stats row
      const statsY = afterTitleY + 46;
      const stats = [
        ['HORAS', c.hours + 'h'],
        ['EXPERIENCIA', '+' + c.xp + ' XP'],
        ['EMITIDO', fmtDate(c.issuedAt).toUpperCase()],
      ];
      const boxW = 150, gap = 22, totalW = boxW*3+gap*2, startX = W/2-totalW/2;
      stats.forEach((s,i)=>{
        const x = startX + i*(boxW+gap);
        doc.setDrawColor(60,60,66);
        doc.setLineWidth(0.7);
        doc.line(x, statsY, x+boxW, statsY);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8.5);
        doc.setTextColor(...forge);
        doc.text(s[0], x+boxW/2, statsY+16, { align:'center' });
        doc.setFont('helvetica','bold');
        doc.setFontSize(14);
        doc.setTextColor(...bone);
        doc.text(s[1], x+boxW/2, statsY+34, { align:'center' });
      });

      // signature line (left)
      const sigY = H-92;
      doc.setFont('times','italic');
      doc.setFontSize(20);
      doc.setTextColor(...bone);
      doc.text('Dirección de Talento FORJA', 90, sigY-6);
      doc.setDrawColor(...boneDim);
      doc.setLineWidth(0.6);
      doc.line(90, sigY+4, 300, sigY+4);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(...boneDim);
      doc.text('Firma digital autorizada · FORJA Talento', 90, sigY+18);

      // verification code (left-bottom, mono style)
      doc.setFont('courier','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(...gold);
      doc.text('CÓDIGO DE VERIFICACIÓN: ' + c.code, 90, H-44);

      // seal (right)
      const sealX = W-130, sealY = H-110, r = 46;
      doc.setDrawColor(...forge);
      doc.setLineWidth(2);
      doc.circle(sealX, sealY, r);
      doc.setDrawColor(...gold);
      doc.setLineWidth(1);
      doc.circle(sealX, sealY, r-9);
      // dashed inner ring
      doc.setLineDashPattern([2,2],0);
      doc.circle(sealX, sealY, r-16);
      doc.setLineDashPattern([],0);

      doc.setFont('times','bold');
      doc.setFontSize(15);
      doc.setTextColor(...forge);
      doc.text('FRJ', sealX, sealY-2, { align:'center' });
      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.setTextColor(...gold);
      doc.text('VERIFICADO DIGITALMENTE', sealX, sealY+10, { align:'center' });
      doc.setFontSize(6);
      doc.setTextColor(...boneDim);
      doc.text(new Date(c.issuedAt).getFullYear().toString(), sealX, sealY+19, { align:'center' });

      // small digital-seal dot grid (fake QR-like pattern) bottom right corner
      const gridX = W-216, gridY = H-58, cell = 4.4;
      let seedNum = 0; for(const ch of c.code) seedNum += ch.charCodeAt(0);
      for(let i=0;i<8;i++){
        for(let j=0;j<8;j++){
          const v = (seedNum * (i+1) * 7 + j*13) % 5;
          if(v < 2){
            doc.setFillColor(...gold);
            doc.rect(gridX+i*cell, gridY+j*cell, cell-1, cell-1, 'F');
          }
        }
      }

      // footer
      doc.setFont('helvetica','normal');
      doc.setFontSize(7.5);
      doc.setTextColor(...boneDim);
      doc.text('Este documento certifica la finalización de un proyecto de experiencia profesional en la plataforma FORJA. Verifica su autenticidad con el código indicado.', W/2, H-22, { align:'center' });

      doc.save(`Certificado-FORJA-${c.code}.pdf`);
    }

    /* ---------------------------------------------------------------------------
       BINDINGS GLOBALES (delegación de eventos por vista)
    --------------------------------------------------------------------------- */
    function bindGlobalHandlers(root){
      // login buttons
      const ls = document.getElementById('login-student');
      const lc = document.getElementById('login-company');
      if(ls) ls.addEventListener('click', ()=>{ STATE.session = { role:'student', userId: STATE.student.id }; saveState(); location.hash = '#/student'; });
      if(lc) lc.addEventListener('click', ()=>{ STATE.session = { role:'company', userId: STATE.company.id }; saveState(); location.hash = '#/company'; });

      // apply button
      const applyBtn = document.getElementById('apply-btn');
      if(applyBtn) applyBtn.addEventListener('click', ()=>{
        const id = new URLSearchParams(location.hash.split('?')[1]).get('id');
        applyToProject(id);
        route();
      });

      // milestone checkboxes
      root.querySelectorAll('input[data-milestone]').forEach(cb=>{
        cb.addEventListener('change', ()=>{
          toggleMilestone(cb.dataset.app, cb.dataset.milestone);
          route();
        });
      });

      // certificate download
      root.querySelectorAll('[data-download-cert]').forEach(btn=>{
        btn.addEventListener('click', ()=> downloadCertificatePDF(btn.dataset.downloadCert));
      });

      // explorer filters
      const searchInput = document.getElementById('search-input');
      const catSel = document.getElementById('filter-cat');
      const lvlSel = document.getElementById('filter-lvl');
      function applyFilters(){
        const p = new URLSearchParams();
        if(searchInput && searchInput.value) p.set('q', searchInput.value);
        if(catSel && catSel.value) p.set('cat', catSel.value);
        if(lvlSel && lvlSel.value) p.set('lvl', lvlSel.value);
        location.hash = '#/student/projects?' + p.toString();
      }
      if(searchInput) searchInput.addEventListener('input', debounce(applyFilters, 280));
      if(catSel) catSel.addEventListener('change', applyFilters);
      if(lvlSel) lvlSel.addEventListener('change', applyFilters);

      // applicants actions
      root.querySelectorAll('[data-accept-app]').forEach(b=>b.addEventListener('click', ()=>{ companyAcceptApplication(b.dataset.acceptApp); route(); }));
      root.querySelectorAll('[data-reject-app]').forEach(b=>b.addEventListener('click', ()=>{ companyRejectApplication(b.dataset.rejectApp); route(); }));
      root.querySelectorAll('[data-approve-app]').forEach(b=>b.addEventListener('click', ()=>{ companyApproveCompletion(b.dataset.approveApp); route(); }));

      // profile skills
      const addSkillBtn = document.getElementById('add-skill-btn');
      if(addSkillBtn) addSkillBtn.addEventListener('click', ()=>{
        const input = document.getElementById('skill-input');
        const val = input.value.trim();
        if(!val) return;
        STATE.student.skills.push(val);
        saveState(); route();
      });
      root.querySelectorAll('[data-remove-skill]').forEach(el=>{
        el.addEventListener('click', (e)=>{
          e.stopPropagation();
          const idx = Number(el.dataset.removeSkill);
          STATE.student.skills.splice(idx,1);
          saveState(); route();
        });
      });

      // publish project form (dynamic milestones)
      const publishForm = document.getElementById('publish-form');
      if(publishForm){
        const wrap = document.getElementById('milestones-wrap');
        function addMilestoneRow(label, hours){
          const row = document.createElement('div');
          row.style.cssText = 'display:flex; gap:8px;';
          row.innerHTML = `<input type="text" placeholder="Descripción del hito" value="${label?esc(label):''}" class="ms-label" style="flex:2; background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--bone); font-size:16px;">
            <input type="number" placeholder="Horas" value="${hours||''}" class="ms-hours" style="flex:1; background:var(--bg-elevated); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--bone); font-size:16px;">
            <button type="button" class="btn btn-ghost btn-sm ms-remove" style="padding:8px 10px;">✕</button>`;
          row.querySelector('.ms-remove').addEventListener('click', ()=> row.remove());
          wrap.appendChild(row);
        }
        addMilestoneRow('Análisis y planificación', 15);
        addMilestoneRow('Desarrollo principal', 40);
        document.getElementById('add-milestone-btn').addEventListener('click', ()=> addMilestoneRow('',''));

        publishForm.addEventListener('submit', (e)=>{
          e.preventDefault();
          const fd = new FormData(publishForm);
          const milestones = [...wrap.querySelectorAll('div')].map(row=>({
            label: row.querySelector('.ms-label').value.trim(),
            hours: row.querySelector('.ms-hours').value,
          })).filter(m=>m.label);
          if(!milestones.length){ toast('Agrega al menos un hito.'); return; }
          const payload = {
            title: fd.get('title'), category: fd.get('category'), level: fd.get('level'),
            description: fd.get('description'), duration: fd.get('duration'),
            hours: fd.get('hours'), xp: fd.get('xp'), spots: fd.get('spots'),
            tech: (fd.get('tech')||'').split(',').map(s=>s.trim()).filter(Boolean),
            requirements: (fd.get('requirements')||'').split('\n').map(s=>s.trim()).filter(Boolean),
            milestones,
          };
          const id = publishProject(payload);
          location.hash = '#/company/applicants?id=' + id;
        });
      }

      // notification bell
      const bellBtn = document.getElementById('notif-bell-btn');
      const notifPanel = document.getElementById('notif-panel');
      if(bellBtn && notifPanel){
        bellBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          const opening = notifPanel.style.display === 'none';
          notifPanel.style.display = opening ? 'block' : 'none';
          if(opening && STATE.session){
            markAllNotificationsRead(STATE.session.role);
            const dot = bellBtn.querySelector('span');
            if(dot) dot.remove();
          }
        });
        notifPanel.addEventListener('click', (e)=> e.stopPropagation());
        document.addEventListener('click', ()=>{ notifPanel.style.display = 'none'; }, { once:true });
      }

      function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
    }

    /* ---------------------------------------------------------------------------
       INIT
    --------------------------------------------------------------------------- */
    route();

    })();

    </script>
    </body>
    </html>
